# ── Indian Common Name Detection ──────────────────────────────────
# Prevents false auto-merges for common Indian names (e.g., Rajesh Kumar)
# when the only matching signals are name + specialty + city.
common_name_detection:
  enabled: true
  # Require BOTH first AND last name to be in the common-names dictionary.
  # If false, a single common component is enough to flag as common.
  require_both_parts_common: true
  # Region context (future extensibility for non-Indian data)
  region: india

# ── Effort Avoidance / Time Saved ─────────────────────────────────
# Manual review velocity (suspect pairs resolved per hour by a human
# data steward).  Used to estimate hours saved via automation.
# Set to your team's observed throughput; default based on 6-7 pairs/hr.
manual_review:
  pairs_per_hour: 6.5

# ── Output Options ─────────────────────────────────────────────────
output:
  # Include enrichment columns (names, specialties, cities) alongside
  # each VID in the output pairs so reviewers don't have to cross-ref.
  enrich_output: true

  # Write both XLSX and CSV variants
  write_csv: true

  # Max width for contact string columns in output (chars)
  max_contact_display: 200
